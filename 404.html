<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
  // SPA fallback for GitHub Pages – 경로 보존 (레포 디렉터리 유지)
  const segmentCount = 1; // /funny-voca
  const l = window.location;
  const pathname = l.pathname; // 예: /funny-voca/home
  const basePath = pathname.split('/').slice(0, 1 + segmentCount).join('/') || '/';
  const relative = pathname.split('/').slice(1 + segmentCount).join('/');
  const finalPath = basePath + (relative ? '/' + relative : '');
  const newUrl = l.protocol + '//' + l.host + finalPath + l.search + l.hash;
  l.replace(newUrl);
</script>
  </head>
  <body></body>
</html>
