<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
      // SPA fallback for GitHub Pages – 경로 보존 (Rafrex 방식)
      // segmentCount: 레포 디렉터리 단계 수 (1 = /funny-voca)
      const segmentCount = 1;
      const l = window.location;
      // 레포 디렉터리까지 포함한 기본 경로
      const basePath = l.pathname.split('/').slice(0, 1 + segmentCount).join('/') || '/';
      // 레포 디렉터리 이후의 경로 (예: home, play/0 등)
      const remainingPath = l.pathname.split('/').slice(1 + segmentCount).join('/');
      // 새로운 URL: basePath + '/?p=/' + remainingPath (remainingPath may be empty)
      const newUrl = l.protocol + '//' + l.host + basePath + '/?p=/' + (remainingPath ? remainingPath : '') + l.search + l.hash;
      l.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
